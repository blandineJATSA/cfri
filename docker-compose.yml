version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cfri_postgres
    environment:
      POSTGRES_DB: cfri_dev
      POSTGRES_USER: cfri_user
      POSTGRES_PASSWORD: cfri_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cfri_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: